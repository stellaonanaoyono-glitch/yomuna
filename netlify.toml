[build]
  publish = "."
  functions = "netlify/functions"
 
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
 
[build.environment]
  NODE_VERSION = "18"
 
# Email de rappel quotidien à 18h WAT (17h UTC)
[functions."daily-reminder"]
  schedule = "0 17 * * *"
 
# Emails rappel expiration abonnement — tous les jours à 9h WAT (8h UTC)
[functions."subscription-reminder"]
  schedule = "0 8 * * *"
 
